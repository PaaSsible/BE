name: Naver Cloud CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: set-services
        run: |
          CHANGED=$(git diff --name-only origin/main~1..HEAD)

          SERVICES=""
          if echo "$CHANGED" | grep -q "^user-service/"; then SERVICES="$SERVICES user-service"; fi
          if echo "$CHANGED" | grep -q "^board-service/"; then SERVICES="$SERVICES board-service"; fi
          if echo "$CHANGED" | grep -q "^recruit-service/"; then SERVICES="$SERVICES recruit-service"; fi
          if echo "$CHANGED" | grep -q "^meet-service/"; then SERVICES="$SERVICES meet-service"; fi
          if echo "$CHANGED" | grep -q "^chat-service/"; then SERVICES="$SERVICES chat-service"; fi

          echo "Detected services:$SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build & Push Changed Services
    needs: detect-changes
    if: needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Images
        run: |
          for service in ${{ needs.detect-changes.outputs.services }}; do
            echo "▶ Build & Push $service"
            docker build -f $service/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/$service:latest .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/$service:latest
          done

  deploy:
    name: Deploy Changed Services to EC2
    needs: [detect-changes, build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            cd /home/user/paassible

            echo "▶ DockerHub login"
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}

            for service in ${{ needs.detect-changes.outputs.services }}; do
              echo "▶ Deploy $service"
              docker compose pull $service
              docker compose up -d --no-deps --force-recreate --pull always  $service
            done

            echo "▶ Deployment completed"

          
